<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note | Testing | App</title>
    <link rel="stylesheet" href="/Css/Note testing app.css">
    <link rel="stylesheet" href="/model/Icon/node_modules/@fortawesome/fontawesome-free/css/all.css">
</head>

<body>
    <header class="container-header">
        <a href="">Note</a>

        <div class="container-button">
            <Button>
                <i class="fa-solid fa-edit"></i>
            </Button>
            <Button id="Openform">
                <i class="fa-solid fa-add"></i>
            </Button>
            <Button>
                <i class="fa-solid fa-ellipsis"></i>
            </Button>
        </div>
    </header>

    <main>
        <section class="Addnote">
            <header class="container-header">
                <a href="">Note</a>
            
                <div class="container-button">
                    <Button>
                        <i class="fa-solid fa-check"></i>
                    </Button>
                    <Button id="Openform">
                        <i class="fa-solid fa-close"></i>
                    </Button>
                </div>
            </header>
            <form class="formAdd">
                <div class="inputtitle">
                    <label for="inputtitle">Input title</label>
                    <input type="text" id="inputtitle" name="inputtitle">
                </div>
                <div class="inputnote">
                    <label for="inputnote">Input note</label>
                    <textarea name="inputnote" id="inputnote"></textarea>
                </div>
            </form>
        </section>
    </main>

    <script src="/Js/Note testing app.js"></script>
</body>

</html>
