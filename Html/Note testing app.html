<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note | Testing | App</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/Css/Note testing app.css">

    <!-- Font Awesome CDN (FIXED) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- SweetAlert2 CDN (RECOMMENDED) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <header class="container-header">
        <a href="#">Note</a>

        <div class="container-button">
            <button>
                <i class="fa-solid fa-pen"></i>
            </button>

            <button id="Openform" onclick="OpenForm()">
                <i class="fa-solid fa-plus"></i> <!-- FIXED ICON -->
            </button>

            <button>
                <i class="fa-solid fa-ellipsis"></i>
            </button>
        </div>
    </header>

    <main>
        <section class="Addnote">

            <!-- FORM FIXED -->
            <form class="formAdd" onsubmit="event.preventDefault(); AddNote();">

                <div class="inputtitle">
                    <input type="text" id="inputtitle" placeholder="Input title" required>
                </div>

                <div class="inputnote">
                    <textarea id="inputnote" placeholder="Input note" required></textarea>
                </div>

                <!-- BUTTON INSIDE FORM -->
                <div class="BtnAdd">
                    <button type="submit">Add</button>
                </div>

            </form>
        </section>

        <!-- NOTES OUTPUT -->
        <section class="Notes"></section>
    </main>

    <!-- JS -->
    <script src="/Js/Note testing app.js"></script>

</body>

</html>
